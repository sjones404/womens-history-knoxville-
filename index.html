<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Leaflet Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 16px 0;
    }

    #map {
      height: 80vh;
      width: 100%;
    }
  </style>
</head>

<body>

  <h1>Interactive Map of Womens Rights in Knoxville Tennessee</h1>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>

    // Create the map
    const map = L.map('map').setView([35.9606, -83.9207], 13);

    // Add map tiles
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Tennessee Women's Suffrage Memorial
    var marker1 = L.marker([35.9653, -83.9207]).addTo(map);

    marker1.bindPopup(`
      <div style="text-align:center;">
        <h3>Tennessee Women's Suffrage Memorial</h3>

        <img
          src="womenn.jpg"
          alt="Suffrage Memorial"
          style="width:200px; border-radius:8px;"
        >

        <p>
          A bronze statue located in Market Square created by artist Alan LeQuire.
          It honors the women who campaigned for Tennessee to ratify the
          Nineteenth Amendment giving women the right to vote.
        </p>
      </div>
    `);

    // The Love Kitchen
    var marker2 = L.marker([35.9908, -83.8988]).addTo(map);

    marker2.bindPopup(`
      <div style="text-align:center;">
        <h3>The Love Kitchen</h3>

        <p>
          Founded by twin sisters Ashe and Ellen Turner.
          Their goal was to mitigate hunger amongst impoverished people in Knoxville.
        </p>
      </div>
    `);

    // University of Tennessee
    var marker3 = L.marker([35.9544, -83.9295]).addTo(map);

    marker3.bindPopup(`
      <div style="text-align:center;">
        <h3>University of Tennessee</h3>

        <p>
          Women were admitted on a trial basis in 1892 making UTK
          one of the first coeducational colleges in the United States.
        </p>
      </div>
    `);

    // East Tennessee History Center
    var marker4 = L.marker([35.9617, -83.9165]).addTo(map);

    marker4.bindPopup(`
      <div style="text-align:center;">
        <h3>East Tennessee History Center</h3>

        <p>
          This center covers many parts of local history and emphasizes
          women's roles in Appalachia and local battles for suffrage.
        </p>
      </div>
    `);

    // Burn Memorial
    var marker5 = L.marker([35.9606, -83.9207]).addTo(map);

    marker5.bindPopup(`
      <div style="text-align:center;">
        <h3>Burn Memorial</h3>

        <p>
          Harry T. Burn cast the final vote needed to ratify the 19th Amendment
          after his mother, Febb Ensminger Burn, wrote to him urging him
          to support women's suffrage.
        </p>
      </div>
    `);

    // Lizzie Crozier French Statue
    var marker6 = L.marker([35.9649, -83.9361]).addTo(map);

    marker6.bindPopup(`
      <div style="text-align:center;">
        <h3>Lizzie Crozier French Statue</h3>

        <p>
          A life-size bronze statue of Lizzie Crozier French,
          a pioneer for the women's suffrage movement and advocate
          for women's rights to quality education.
        </p>
      </div>
    `);

  </script>

</body>
</html>
